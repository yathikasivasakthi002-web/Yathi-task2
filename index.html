<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini CRM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Client Lead Management System</h1>

    <div class="form-box">
      <input type="text" id="name" placeholder="Client Name">
      <input type="email" id="email" placeholder="Client Email">
      <input type="text" id="source" placeholder="Lead Source">
      
      <select id="status">
        <option value="New">New</option>
        <option value="Contacted">Contacted</option>
        <option value="Converted">Converted</option>
      </select>

      <textarea id="notes" placeholder="Notes"></textarea>

      <button onclick="addLead()">Add Lead</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Source</th>
          <th>Status</th>
          <th>Notes</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="leadTable"></tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
